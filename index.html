<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saleem's MEPCO Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-gradient { background: linear-gradient(135deg, #ffffff 0%, #f3f4f6 100%); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Saleem's Electricity Dashboard</h1>
            <p class="text-slate-500">MEPCO Bill Management & Manual Tracking</p>
        </header>

        <div id="summary" class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-blue-600 text-white p-4 rounded-xl shadow-lg">
                <p class="text-sm opacity-80">Total Units (Recorded)</p>
                <h2 id="total-units" class="text-2xl font-bold">0</h2>
            </div>
            <div class="bg-emerald-600 text-white p-4 rounded-xl shadow-lg">
                <p class="text-sm opacity-80">Active Connections</p>
                <h2 id="active-cons" class="text-2xl font-bold">0</h2>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-8 flex gap-2">
            <input type="text" id="manual-ref" placeholder="Quick Search Ref..." class="flex-1 border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="animate-pulse bg-white h-40 rounded-xl"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwdDfoylJbUe5-OfhN8M2BlXvxXMD6qmeNEB_uEUVjMReMQNv4YH7UVUQquRSKzkC31/exec';

        async function fetchData() {
            const res = await fetch(API_URL);
            const data = await res.json();
            renderCards(data);
            updateSummary(data);
        }

        function renderCards(data) {
            const container = document.getElementById('cards-container');
            container.innerHTML = data.map(item => `
                <div class="card-gradient p-5 rounded-2xl shadow-md border border-slate-200 flex flex-col gap-4">
                    <div>
                        <span class="text-xs font-bold text-blue-600 uppercase">Reference Number</span>
                        <h3 class="text-lg font-mono font-bold text-slate-700">${item.refNo}</h3>
                    </div>

                    <div class="grid grid-cols-2 gap-4 bg-white p-3 rounded-lg border border-slate-100">
                        <div>
                            <p class="text-xs text-slate-400">Prev. Reading</p>
                            <p class="font-bold">${item.prevReading}</p>
                        </div>
                        <div>
                            <p class="text-xs text-slate-400">MEPCO Reading</p>
                            <p class="font-bold text-emerald-600">${item.currReading}</p>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-semibold text-slate-500">Record Manual Reading:</label>
                        <div class="flex gap-2">
                            <input type="number" id="input-${item.refNo}" placeholder="Enter current" 
                                class="w-full border rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none">
                            <button onclick="saveReading('${item.refNo}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">Save</button>
                        </div>
                    </div>

                    <div class="flex justify-between items-center pt-2 border-t border-dashed">
                        <a href="https://bill.pitc.com.pk/gbill.aspx?refno=${item.refNo}" target="_blank" class="text-blue-500 text-sm font-medium hover:underline">View Official Bill →</a>
                        <div class="text-right">
                            <p class="text-xs text-slate-400">Consumed</p>
                            <p class="text-xl font-black text-slate-800">${item.units} <span class="text-xs font-normal">kWh</span></p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateSummary(data) {
            const total = data.reduce((acc, curr) => acc + curr.units, 0);
            document.getElementById('total-units').innerText = total;
            document.getElementById('active-cons').innerText = data.length;
        }

        async function saveReading(refNo) {
            const val = document.getElementById(`input-${refNo}`).value;
            if(!val) return alert("Please enter a reading");

            // In a real scenario, you'd POST this to your GAS API
            alert(`Saving ${val} for Ref: ${refNo}... (Update API_URL to enable writing)`);
            
            /* await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ refNo: refNo, manualReading: val })
            });
            fetchData(); // Refresh data
            */
        }

        fetchData();
    </script>
</body>
</html>
