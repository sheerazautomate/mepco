<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saleem Electricity Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans&family=IBM+Plex+Mono&display=swap" rel="stylesheet"/>

<style>
body {font-family: 'IBM Plex Sans'; background:#0d0f12; color:#e8ecf4; margin:0;}
header {padding:12px; background:#151820; display:flex; justify-content:space-between;}
.grid {display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:10px; padding:15px;}
.card {background:#151820; padding:12px; border-radius:10px;}
.btn {padding:6px 10px; margin:2px; cursor:pointer;}
input {padding:6px; width:100%;}
</style>
</head>

<body>

<div id="lock" style="display:flex;height:100vh;justify-content:center;align-items:center;">
  <div>
    <h2>Enter Password</h2>
    <input type="password" id="pass"/>
    <button onclick="login()">Unlock</button>
    <div id="err"></div>
  </div>
</div>

<div id="app" style="display:none;">
<header>
  <h3>Electricity Dashboard</h3>
  <button onclick="logout()">Lock</button>
</header>

<div style="padding:10px;">
  <input placeholder="Search..." oninput="searchVal=this.value;render()"/>
  <button onclick="openAdd()">+ Add</button>
  <button onclick="load()">Refresh</button>
</div>

<div id="grid"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwdDfoylJbUe5-OfhN8M2BlXvxXMD6qmeNEB_uEUVjMReMQNv4YH7UVUQquRSKzkC31/exec";
const PASS = "mepco2026";

const CACHE_KEY="meters_cache";
const CACHE_TIME=300000;

let meters=[], searchVal="";

/* AUTH */
function login(){
  if(document.getElementById("pass").value===PASS){
    lock.style.display="none";
    app.style.display="block";
    load();
  }else err.innerText="Wrong password";
}
function logout(){
  app.style.display="none";
  lock.style.display="flex";
}

/* CACHE */
function saveCache(d){
  localStorage.setItem(CACHE_KEY, JSON.stringify({t:Date.now(),d}));
}
function getCache(){
  let c=localStorage.getItem(CACHE_KEY);
  if(!c) return null;
  c=JSON.parse(c);
  if(Date.now()-c.t>CACHE_TIME) return null;
  return c.d;
}

/* API */
async function apiGet(){
  let r=await fetch(API+"?action=get");
  return r.json();
}
async function apiPost(action,data){
  let r=await fetch(API+"?action="+action,{
    method:"POST",
    body:JSON.stringify(data)
  });
  return r.json();
}

/* LOAD */
async function load(){
  let cache=getCache();
  if(cache){
    meters=map(cache);
    render();
  }

  try{
    let data=await apiGet();
    saveCache(data);
    meters=map(data);
    render();
  }catch{
    if(!cache) grid.innerHTML="API Error";
  }
}

/* MAP */
function map(d){
  return d.map(r=>({
    ref:r["REFERENCE NO"],
    name:r["Meter Name"],
    last:+r["Last Month MEPCO Reading"]||0,
    curr:+r["Manual Reading"]||0,
    date:r["Manual Reading Date"]
  }));
}

/* RENDER */
function render(){
  let f=meters.filter(m=>m.name.toLowerCase().includes(searchVal.toLowerCase())||m.ref.includes(searchVal));
  grid.innerHTML=f.map(m=>{
    let u=m.curr-m.last;
    return `<div class="card">
      <b>${m.name}</b><br>${m.ref}<br>
      Units: ${u}<br>
      Last: ${m.last} | Now: ${m.curr}<br>
      ${m.date||""}<br>
      <button class="btn" onclick="edit('${m.ref}')">Edit</button>
      <button class="btn" onclick="del('${m.ref}')">Delete</button>
      <button class="btn" onclick="bill('${m.ref}')">Bill</button>
    </div>`;
  }).join("");
}

/* BILL */
function bill(r){
  window.open("https://bill.pitc.com.pk/gbill.aspx?refno="+r);
}

/* ADD */
function openAdd(){
  let name=prompt("Name");
  let ref=prompt("Ref (14 digit)");
  let last=prompt("Last reading");
  let curr=prompt("Current reading");

  apiPost("create",{
    "REFERENCE NO":ref,
    "Meter Name":name,
    "Last Month MEPCO Reading":+last,
    "Manual Reading":+curr,
    "Manual Reading Date":new Date().toLocaleDateString(),
    "Units Consumed":curr-last
  }).then(()=>refresh());
}

/* EDIT */
function edit(ref){
  let m=meters.find(x=>x.ref==ref);
  let name=prompt("Name",m.name);
  let last=prompt("Last",m.last);
  let curr=prompt("Current",m.curr);

  apiPost("update",{
    ref,
    "Meter Name":name,
    "Last Month MEPCO Reading":+last,
    "Manual Reading":+curr,
    "Manual Reading Date":new Date().toLocaleDateString(),
    "Units Consumed":curr-last
  }).then(()=>refresh());
}

/* DELETE */
function del(ref){
  if(!confirm("Delete?")) return;
  apiPost("delete",{ref}).then(()=>refresh());
}

/* REFRESH */
function refresh(){
  localStorage.removeItem(CACHE_KEY);
  load();
}
</script>

</body>
</html>
