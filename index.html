<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saleem Electricity Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg-color: #0d0f12;
    --card-bg: #1a1d24;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --text-main: #e8ecf4;
    --text-muted: #94a3b8;
    --border: #2d3340;
  }

  * { box-sizing: border-box; }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; }
  
  /* Typography */
  h1, h2, h3 { margin: 0; font-weight: 600; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* Layout */
  header { padding: 16px 20px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .toolbar { padding: 15px 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 0 20px 20px; }
  
  /* Cards */
  .card { background: var(--card-bg); padding: 16px; border-radius: 12px; border: 1px solid var(--border); transition: transform 0.2s; display: flex; flex-direction: column; gap: 8px;}
  .card:hover { border-color: var(--primary); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .meter-name { font-size: 1.1rem; font-weight: 600; color: #fff;}
  .meter-ref { font-size: 0.85rem; color: var(--text-muted); }
  .units { font-size: 1.5rem; font-weight: 600; color: var(--primary); margin: 5px 0; }
  .stats { font-size: 0.9rem; color: var(--text-muted); background: #111318; padding: 8px; border-radius: 6px;}
  
  /* Inputs & Buttons */
  input { padding: 10px 14px; background: #111318; border: 1px solid var(--border); color: #fff; border-radius: 8px; font-family: inherit; outline: none; transition: border 0.2s; }
  input:focus { border-color: var(--primary); }
  button { padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 500; transition: background 0.2s; }
  button:hover { background: var(--primary-hover); }
  button.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  button.danger:hover { background: var(--danger); color: white; }
  button.secondary { background: #2d3340; color: white; }
  button.secondary:hover { background: #3f4758; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Toolbar specific */
  #searchBox { flex: 1; min-width: 200px; }

  /* Auth Screen */
  #lock { display: flex; height: 100vh; justify-content: center; align-items: center; background: var(--bg-color); }
  .auth-box { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; width: 100%; max-width: 320px; }
  .auth-box input { width: 100%; margin: 15px 0; }
  .auth-box button { width: 100%; }
  #err { color: var(--danger); margin-top: 10px; font-size: 0.9rem; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
  .modal { background: var(--card-bg); padding: 24px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
  .form-group { margin-bottom: 15px; text-align: left; }
  .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
  .form-group input { width: 100%; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

  /* Loader / Toast */
  #loader { display: none; margin-left: 10px; font-size: 0.9rem; color: var(--text-muted); }
  #toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: white; padding: 12px 20px; border-radius: 8px; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 1100; }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { background: var(--danger); }
</style>
</head>
<body>

<div id="lock">
  <div class="auth-box">
    <h2>Secure Login</h2>
    <input type="password" id="pass" placeholder="Enter password" onkeypress="if(event.key==='Enter') login()"/>
    <button onclick="login()">Unlock Dashboard</button>
    <div id="err"></div>
  </div>
</div>

<div id="app" style="display:none;">
  <header>
    <h3>⚡ Electricity Dashboard</h3>
    <button onclick="logout()" class="secondary">Lock</button>
  </header>

  <div class="toolbar">
    <input id="searchBox" placeholder="Search by name or reference..." oninput="searchVal=this.value;render()"/>
    <button onclick="openModal('add')">+ Add Meter</button>
    <button onclick="refresh()" class="secondary">↻ Refresh <span id="loader">Syncing...</span></button>
  </div>

  <div id="grid" class="grid"></div>
</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal">
    <h2 id="modalTitle">Add Meter</h2>
    <div style="margin-top: 15px;">
      <input type="hidden" id="meterMode" />
      <input type="hidden" id="originalRef" />
      
      <div class="form-group">
        <label>Meter Name</label>
        <input type="text" id="mName" placeholder="e.g. Ground Floor" />
      </div>
      <div class="form-group">
        <label>Reference No (14 digit)</label>
        <input type="text" id="mRef" placeholder="00000000000000" class="mono" />
      </div>
      <div class="form-group">
        <label>Last Month Reading</label>
        <input type="number" id="mLast" placeholder="0" />
      </div>
      <div class="form-group">
        <label>Current Reading</label>
        <input type="number" id="mCurr" placeholder="0" />
      </div>

      <div class="modal-actions">
        <button onclick="closeModal()" class="secondary">Cancel</button>
        <button id="saveBtn" onclick="saveMeter()">Save Meter</button>
      </div>
    </div>
  </div>
</div>

<div id="toast">Success!</div>

<script>
// --- CONFIG ---
const API = "https://script.google.com/macros/s/AKfycbwdDfoylJbUe5-OfhN8M2BlXvxXMD6qmeNEB_uEUVjMReMQNv4YH7UVUQquRSKzkC31/exec";
const PASS = "mepco2026";
const CACHE_KEY = "meters_cache";
const CACHE_TIME = 300000;

// --- STATE ---
let meters = [];
let searchVal = "";

// --- DOM ELEMENTS ---
const el = {
  lock: document.getElementById('lock'),
  app: document.getElementById('app'),
  pass: document.getElementById('pass'),
  err: document.getElementById('err'),
  grid: document.getElementById('grid'),
  loader: document.getElementById('loader'),
  toast: document.getElementById('toast'),
  modal: document.getElementById('modalOverlay'),
  mTitle: document.getElementById('modalTitle'),
  mMode: document.getElementById('meterMode'),
  oRef: document.getElementById('originalRef'),
  mName: document.getElementById('mName'),
  mRef: document.getElementById('mRef'),
  mLast: document.getElementById('mLast'),
  mCurr: document.getElementById('mCurr'),
  saveBtn: document.getElementById('saveBtn')
};

// --- AUTH ---
function login() {
  if (el.pass.value === PASS) {
    el.lock.style.display = "none";
    el.app.style.display = "block";
    el.pass.value = "";
    load();
  } else {
    el.err.innerText = "Incorrect password";
  }
}

function logout() {
  el.app.style.display = "none";
  el.lock.style.display = "flex";
  meters = [];
  el.grid.innerHTML = "";
}

// --- UTILS ---
function showToast(msg, isError = false) {
  el.toast.innerText = msg;
  el.toast.className = isError ? "error show" : "show";
  setTimeout(() => el.toast.className = "", 3000);
}

function toggleLoad(isLoading) {
  el.loader.style.display = isLoading ? "inline-block" : "none";
}

// --- CACHE ---
function saveCache(d) { localStorage.setItem(CACHE_KEY, JSON.stringify({t: Date.now(), d})); }
function getCache() {
  let c = localStorage.getItem(CACHE_KEY);
  if (!c) return null;
  c = JSON.parse(c);
  if (Date.now() - c.t > CACHE_TIME) return null;
  return c.d;
}

// --- API FETCH ---
async function apiGet() {
  let r = await fetch(API + "?action=get");
  return r.json();
}

async function apiPost(action, data) {
  try {
    let r = await fetch(API + "?action=" + action, {
      method: "POST",
      body: JSON.stringify(data)
    });
    return await r.json();
  } catch (e) {
    console.warn("GAS POST CORS issue handled gracefully", e);
    // GAS often redirects on POST causing CORS block on the return object, 
    // even though the data actually writes. We return a fake success.
    return { success: true };
  }
}

// --- CORE LOGIC ---
async function load() {
  let cache = getCache();
  if (cache) {
    meters = mapData(cache);
    render();
  }
  
  toggleLoad(true);
  try {
    let data = await apiGet();
    saveCache(data);
    meters = mapData(data);
    render();
  } catch(e) {
    if (!cache) el.grid.innerHTML = `<div style="color:var(--danger)">Failed to connect to API</div>`;
    showToast("Failed to fetch fresh data", true);
  }
  toggleLoad(false);
}

function refresh() {
  localStorage.removeItem(CACHE_KEY);
  load();
}

function mapData(d) {
  return d.map(r => ({
    ref: r["REFERENCE NO"],
    name: r["Meter Name"],
    last: +r["Last Month MEPCO Reading"] || 0,
    curr: +r["Manual Reading"] || 0,
    date: r["Manual Reading Date"]
  }));
}

function render() {
  let filtered = meters.filter(m => 
    m.name.toLowerCase().includes(searchVal.toLowerCase()) || 
    m.ref.includes(searchVal)
  );

  if (filtered.length === 0) {
    el.grid.innerHTML = `<div style="color:var(--text-muted)">No meters found.</div>`;
    return;
  }

  el.grid.innerHTML = filtered.map(m => {
    let u = m.curr - m.last;
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="meter-name">${m.name}</div>
            <div class="meter-ref mono">Ref: ${m.ref}</div>
          </div>
        </div>
        <div class="units">${u} Units</div>
        <div class="stats">
          Last: <b>${m.last}</b> &nbsp;|&nbsp; Now: <b>${m.curr}</b>
          <div style="font-size:0.8rem; margin-top:4px;">Updated: ${m.date || "N/A"}</div>
        </div>
        <div style="display:flex; gap:8px; margin-top:10px;">
          <button class="secondary" style="flex:1" onclick="openModal('edit', '${m.ref}')">Edit</button>
          <button class="danger" onclick="del('${m.ref}')">Delete</button>
          <button style="flex:1" onclick="bill('${m.ref}')">View Bill</button>
        </div>
      </div>
    `;
  }).join("");
}

// --- ACTIONS ---
function bill(r) {
  window.open("https://bill.pitc.com.pk/gbill.aspx?refno=" + r, "_blank");
}

async function del(ref) {
  if (!confirm("Are you sure you want to delete this meter?")) return;
  
  toggleLoad(true);
  await apiPost("delete", { ref });
  showToast("Meter Deleted");
  refresh();
}

// --- MODAL LOGIC ---
function openModal(mode, ref = null) {
  el.mMode.value = mode;
  if (mode === 'add') {
    el.mTitle.innerText = "Add New Meter";
    el.oRef.value = "";
    el.mName.value = "";
    el.mRef.value = "";
    el.mRef.disabled = false;
    el.mLast.value = "";
    el.mCurr.value = "";
  } else {
    let m = meters.find(x => x.ref === ref);
    if (!m) return;
    el.mTitle.innerText = "Edit Meter";
    el.oRef.value = m.ref;
    el.mName.value = m.name;
    el.mRef.value = m.ref;
    el.mRef.disabled = true; // Don't allow changing ref on edit to prevent GAS mismatch
    el.mLast.value = m.last;
    el.mCurr.value = m.curr;
  }
  el.modal.style.display = "flex";
}

function closeModal() {
  el.modal.style.display = "none";
}

async function saveMeter() {
  let mode = el.mMode.value;
  let name = el.mName.value.trim();
  let ref = mode === 'edit' ? el.oRef.value : el.mRef.value.trim();
  let last = +el.mLast.value || 0;
  let curr = +el.mCurr.value || 0;

  if (!name || !ref) {
    alert("Name and Reference No are required.");
    return;
  }

  el.saveBtn.disabled = true;
  el.saveBtn.innerText = "Saving...";

  let payload = {
    "REFERENCE NO": ref,
    "Meter Name": name,
    "Last Month MEPCO Reading": last,
    "Manual Reading": curr,
    "Manual Reading Date": new Date().toLocaleDateString(),
    "Units Consumed": curr - last
  };

  if (mode === 'edit') {
    payload.ref = ref; // Ensure update payload has 'ref'
    await apiPost("update", payload);
    showToast("Meter Updated!");
  } else {
    await apiPost("create", payload);
    showToast("Meter Added!");
  }

  el.saveBtn.disabled = false;
  el.saveBtn.innerText = "Save Meter";
  closeModal();
  refresh();
}
</script>

</body>
</html>
